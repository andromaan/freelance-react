<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/components/icons/FreelanceIcon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freelance</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.4s ease;
      }
      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      @media (prefers-color-scheme: dark) {
        #app-loader {
          background: #111827;
        }
      }

      /* Three-dot wave */
      .app-loader-dots {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .app-loader-dots span {
        display: block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #1976d2;
        animation: dot-wave 1.2s ease-in-out infinite;
        transform-origin: center bottom;
      }
      .app-loader-dots span:nth-child(1) {
        animation-delay: 0s;
      }
      .app-loader-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .app-loader-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes dot-wave {
        0%,
        60%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.5;
        }
        30% {
          transform: translateY(-14px) scale(1.15);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Full-page loader: visible before React mounts, removed in App.tsx -->
    <div id="app-loader">
      <div class="app-loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
